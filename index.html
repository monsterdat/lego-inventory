<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#E3000B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>LEGO Inventory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E3000B;
      --yellow: #FFD700;
      --dark: #1A1A1A;
      --gray: #6B7280;
      --light-gray: #F3F4F6;
      --white: #FFFFFF;
      --border: #E5E7EB;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--light-gray);
      color: var(--dark);
      min-height: 100dvh;
      /* Push content above the nav bar + iPhone home indicator */
      padding-bottom: calc(70px + env(safe-area-inset-bottom, 0px));
    }

    header {
      background: var(--red);
      color: white;
      /* Account for iPhone status bar / Dynamic Island */
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 1.2rem; font-weight: 700; }

    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      /* Extend behind iPhone home indicator */
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    nav button {
      flex: 1;
      padding: 10px 0 10px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 0.68rem;
      color: var(--gray);
      transition: color 0.2s;
      /* Minimum tap target */
      min-height: 48px;
    }

    nav button.active { color: var(--red); }
    nav button svg { width: 22px; height: 22px; }

    .view { display: none; padding: 16px; }
    .view.active { display: block; }
    /* Dashboard has no side padding — handled by inner .dash-body */
    #view-dashboard.active { padding: 0; }

    /* Stats */
    .stats-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-pill {
      background: white;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.78rem;
      white-space: nowrap;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    .stat-pill strong { color: var(--red); }

    /* Search */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      background: white;
      outline: none;
      min-height: 48px;
    }
    .search-bar input:focus { border-color: var(--red); }

    .filter-select {
      padding: 10px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      background: white;
      outline: none;
      cursor: pointer;
      max-width: 110px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    /* Card */
    .set-card {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .set-card:active { transform: scale(0.97); }

    .set-card .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .set-card .card-no-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--light-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .card-body { padding: 10px 12px 12px; }
    .card-number { font-size: 0.72rem; color: var(--gray); margin-bottom: 2px; }
    .card-name { font-size: 0.88rem; font-weight: 600; line-height: 1.3; }

    .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 7px; }
    .badge {
      font-size: 0.63rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-built       { background: #D1FAE5; color: #065F46; }
    .badge-unbuilt     { background: #FEF3C7; color: #92400E; }
    .badge-incomplete  { background: #FEE2E2; color: #991B1B; }
    .badge-theme       { background: #EDE9FE; color: #5B21B6; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 80px; right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--red);
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(227,0,11,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      z-index: 90;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.93); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 600px;
      /* Leave room for iPhone home indicator at bottom */
      max-height: calc(92dvh - env(safe-area-inset-bottom, 0px));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 20px calc(32px + env(safe-area-inset-bottom, 0px));
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin: 0 auto 16px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 1.15rem; font-weight: 700; }

    .close-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--light-gray);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--gray);
    }

    /* Form */
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      /* 16px prevents iOS zoom on focus */
      font-size: 16px;
      background: white;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
      /* Comfortable touch target */
      min-height: 48px;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--red); }

    .form-group input.ai-filled {
      border-color: #7C3AED;
      background: #FAF5FF;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Image picker */
    .image-picker {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      background: var(--light-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--gray);
      font-size: 0.88rem;
      transition: border-color 0.15s;
    }
    .image-picker:hover { border-color: var(--red); }
    .image-picker input[type="file"] { display: none; }
    .image-picker .picker-icon { font-size: 2.2rem; }

    .image-picker .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-picker .change-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.88rem;
      font-weight: 600;
      gap: 6px;
    }
    .image-picker:hover .change-overlay { display: flex; }

    /* AI analysis overlay */
    .ai-overlay {
      position: absolute;
      inset: 0;
      background: rgba(124,58,237,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #7C3AED;
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 4px;
      letter-spacing: 0.03em;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary   { background: var(--red); color: white; }
    .btn-secondary { background: var(--light-gray); color: var(--dark); }
    .btn-danger    { background: #FEE2E2; color: #991B1B; }
    .btn-purple    { background: #EDE9FE; color: #5B21B6; }

    /* Detail */
    .detail-image {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 14px;
    }
    .detail-no-image {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--light-gray);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      margin-bottom: 14px;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }
    .meta-item {
      background: var(--light-gray);
      border-radius: 10px;
      padding: 12px;
    }
    .meta-label {
      font-size: 0.7rem;
      color: var(--gray);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .meta-value {
      font-size: 1rem;
      font-weight: 700;
      margin-top: 4px;
    }

    .action-row { display: flex; gap: 8px; margin-top: 14px; }
    .action-row .btn { flex: 1; }

    /* Settings */
    .settings-card {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .settings-card-title {
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .settings-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-item label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray);
      display: block;
      margin-bottom: 6px;
    }
    .settings-item input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: monospace;
      outline: none;
    }
    .settings-item input:focus { border-color: var(--red); }
    .settings-item .hint {
      font-size: 0.75rem;
      color: var(--gray);
      margin-top: 5px;
      line-height: 1.5;
    }
    /* Visually mask sensitive fields without using type="text" class="secret-input",
       which triggers iOS autofill across the entire domain */
    .secret-input { -webkit-text-security: disc; }
    .secret-input::placeholder { -webkit-text-security: none; }

    /* Setup screen */
    .setup-screen {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      background: white;
    }
    .setup-logo { font-size: 3.5rem; margin-bottom: 14px; }
    .setup-screen h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .setup-screen .subtitle {
      color: var(--gray);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.65;
    }
    .setup-form { width: 100%; max-width: 420px; }
    .setup-divider {
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray);
      margin: 20px 0;
      position: relative;
    }
    .setup-divider::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }
    .setup-divider span {
      position: relative;
      background: white;
      padding: 0 12px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.88rem;
      z-index: 400;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: calc(100vw - 40px);
      text-align: center;
    }
    .toast.show { opacity: 1; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner-purple {
      border-color: rgba(124,58,237,0.3);
      border-top-color: #7C3AED;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--dark); }
    .empty-state p { font-size: 0.88rem; line-height: 1.6; }

    /* Info box */
    .info-box {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #1E40AF;
      margin-bottom: 16px;
    }

    /* Re-analyse button */
    .btn-reanalyse {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #F5F3FF;
      color: #6D28D9;
      border: 1.5px solid #C4B5FD;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-reanalyse:disabled { opacity: 0.55; cursor: default; }

    /* ── Dashboard tab ─────────────────── */
    #view-dashboard { padding-bottom: 80px; }
    .dash-hero {
      background: linear-gradient(145deg, #C8001A 0%, #E3000B 60%, #FF6B6B 100%);
      color: white;
      padding: 28px 20px 36px;
      text-align: center;
    }
    .dash-hero-label { font-size: 0.78rem; font-weight: 600; opacity: 0.85; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
    .dash-hero-value { font-size: 2.8rem; font-weight: 800; line-height: 1; margin-bottom: 6px; letter-spacing: -0.02em; }
    .dash-hero-sub { font-size: 0.88rem; opacity: 0.82; }

    .dash-body { padding: 0 16px; margin-top: -18px; }
    .dash-section { margin-bottom: 20px; }
    .dash-section-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--gray); margin: 16px 0 10px;
    }

    .dash-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .dcard {
      background: white; border-radius: 16px; padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .dcard-label { font-size: 0.73rem; color: var(--gray); margin-bottom: 6px; }
    .dcard-value { font-size: 1.25rem; font-weight: 800; color: var(--dark); }
    .dcard-value.pos { color: #059669; }
    .dcard-value.neg { color: var(--red); }

    .dcard-wide {
      background: white; border-radius: 16px; padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 10px;
    }
    .dcard-wide-label { font-size: 0.73rem; color: var(--gray); margin-bottom: 4px; }
    .dcard-wide-value { font-size: 1.55rem; font-weight: 800; color: var(--dark); }
    .dcard-wide-sub { font-size: 0.8rem; color: var(--gray); margin-top: 2px; }

    .dlist { background: white; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden; }
    .dlist-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; border-bottom: 1px solid var(--border);
    }
    .dlist-row:last-child { border-bottom: none; }
    .dlist-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--red); color: white;
      font-size: 0.8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .dlist-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .dlist-bar-wrap { width: 70px; height: 5px; background: var(--light-gray); border-radius: 3px; }
    .dlist-bar { height: 5px; border-radius: 3px; background: var(--red); min-width: 4px; }
    .dlist-count { font-size: 0.85rem; font-weight: 700; min-width: 28px; text-align: right; }

    .cond-icon { font-size: 1.2rem; }

    .dash-empty {
      text-align: center; padding: 60px 20px; color: var(--gray);
    }
    .dash-empty .de-icon { font-size: 3rem; margin-bottom: 12px; }
    .dash-empty h3 { font-size: 1rem; color: var(--dark); margin-bottom: 6px; }
    .dash-empty p { font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const Config = {
  KEY: 'lego_config',
  get() {
    try { return JSON.parse(localStorage.getItem(this.KEY)); }
    catch { return null; }
  },
  set(cfg) { localStorage.setItem(this.KEY, JSON.stringify(cfg)); },
  clear() { localStorage.removeItem(this.KEY); },
  isValid(cfg) { return cfg && cfg.owner && cfg.repo && cfg.token; }
};

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const state = {
  view: 'list',
  inventory: [],
  inventorySha: null,
  search: '',
  filterCondition: '',
  filterTheme: '',
  editingSet: null,
  syncing: false,
};

// ─────────────────────────────────────────────────────────────
// GITHUB API
// ─────────────────────────────────────────────────────────────
const GitHub = {
  get cfg() { return Config.get(); },
  base() { return `https://api.github.com/repos/${this.cfg.owner}/${this.cfg.repo}/contents`; },
  headers() {
    return {
      'Authorization': `Bearer ${this.cfg.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28',
    };
  },
  async getFile(path) {
    const res = await fetch(`${this.base()}/${path}`, { headers: this.headers() });
    if (res.status === 404) return null;
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `GitHub ${res.status}`); }
    return res.json();
  },
  async putFile(path, text, sha, message) {
    const encoded = btoa(unescape(encodeURIComponent(text)));
    const body = { message, content: encoded };
    if (sha) body.sha = sha;
    const res = await fetch(`${this.base()}/${path}`, {
      method: 'PUT', headers: this.headers(), body: JSON.stringify(body)
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `GitHub ${res.status}`); }
    return res.json();
  },
  async putBinary(path, base64Data, sha, message) {
    const body = { message, content: base64Data };
    if (sha) body.sha = sha;
    const res = await fetch(`${this.base()}/${path}`, {
      method: 'PUT', headers: this.headers(), body: JSON.stringify(body)
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `GitHub ${res.status}`); }
    return res.json();
  },
  async deleteFile(path, sha, message) {
    const res = await fetch(`${this.base()}/${path}`, {
      method: 'DELETE', headers: this.headers(), body: JSON.stringify({ message, sha })
    });
    if (!res.ok && res.status !== 404) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `GitHub ${res.status}`); }
  },
  async testConnection() {
    const res = await fetch(`https://api.github.com/repos/${this.cfg.owner}/${this.cfg.repo}`, { headers: this.headers() });
    return res.ok;
  },
};

async function callClaude(apiKey, messages, { max_tokens = 512, model = 'claude-haiku-4-5-20251001' } = {}) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({ model, max_tokens, messages })
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    if (res.status === 401) throw new Error('Invalid Anthropic API key — check Settings.');
    throw new Error(`Claude API error ${res.status}: ${body?.error?.message || res.statusText}`);
  }
  const data = await res.json();
  return data.content[0].text.trim();
}

function parseJson(text) {
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) return {};
  try { return JSON.parse(m[0]); } catch { return {}; }
}

async function analyzeImageWithClaude(dataUrl) {
  const cfg = Config.get();
  if (!cfg?.anthropicKey) throw new Error('No Anthropic API key set in Settings');
  const apiKey = cfg.anthropicKey.trim();
  if (!apiKey) throw new Error('Anthropic API key is empty. Add it in Settings.');

  const smallDataUrl = await resizeImageFromDataUrl(dataUrl, 800, 0.82);
  const base64 = smallDataUrl.split(',')[1];

  // Step 1: Image OCR — focused only on reading the set number and condition
  const imagePrompt = `Look at this LEGO image. Your only job is to read the LEGO set number.

The set number is 4-6 digits (e.g. 75192, 10305, 21325). Find it:
- Box corners (bottom-right or bottom-left, often after "#" or "No.")
- Box side panels
- Instruction booklet cover
- Bottom sticker/plate on a built set

Also assess condition from visual cues.

Return ONLY valid JSON, no markdown or extra text:
{"setNumber": "digits only, no dashes, or null", "condition": "built|unbuilt|incomplete", "notes": "brief observation or null"}`;

  let step1Text;
  try {
    step1Text = await callClaude(apiKey, [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
        { type: 'text', text: imagePrompt }
      ]
    }]);
  } catch (err) {
    throw new Error(err.message || 'Could not reach Anthropic API.');
  }
  const step1 = parseJson(step1Text);

  // Step 2: Knowledge lookup using Sonnet — much better LEGO pricing knowledge than Haiku
  let step2 = {};
  if (step1.setNumber) {
    try {
      step2 = await fetchSetMetadata(apiKey, step1.setNumber);
    } catch (_) {}
  }

  // step2 has name/theme/year/pieceCount/prices from knowledge; step1 has setNumber/condition/notes from image
  return { ...step2, ...step1 };
}

async function fetchSetMetadata(apiKey, setNumber) {
  const prompt = `You are a LEGO product expert with detailed knowledge of all LEGO sets and their pricing.
For LEGO set number ${setNumber}, provide the official product details and Singapore retail pricing.

Return ONLY valid JSON, no markdown or code fences:
{
  "name": "exact official LEGO product name as listed on shop.lego.com",
  "theme": "theme e.g. Star Wars, Technic, Icons, City, Creator Expert, Botanical Collection, Harry Potter",
  "year": release year as integer,
  "pieceCount": piece count as integer,
  "purchasePrice": Singapore retail price in SGD including GST as a number e.g. 169.9,
  "marketValue": current approximate used/secondary market value in SGD as a number
}

Be specific and accurate. Singapore LEGO prices include 9% GST. Use null only if you truly do not know.`;

  const text = await callClaude(
    apiKey,
    [{ role: 'user', content: prompt }],
    { max_tokens: 400, model: 'claude-sonnet-4-6' }
  );
  return parseJson(text);
}

async function proxyFetch(url) {
  for (const base of ['https://corsproxy.io/?url=', 'https://api.allorigins.win/raw?url=']) {
    try {
      const res = await fetch(base + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (res.ok) return res.text();
    } catch (_) {}
  }
  throw new Error('Proxy unavailable');
}

async function getUSDtoSGD() {
  const res = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(5000) });
  const data = await res.json();
  return data.rates?.SGD ?? 1.35;
}

async function scrapeBrickEconomy(setNum) {
  const html = await proxyFetch(`https://www.brickeconomy.com/set/${setNum}-1`);
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const out = {};

  // Specs table rows: Year, Pieces, Theme
  doc.querySelectorAll('.contentrow, table tr').forEach(row => {
    const cells = [...row.querySelectorAll('td, th, .rowlabel, .rowvalue')];
    if (cells.length < 2) return;
    const key = cells[0].textContent.trim().toLowerCase();
    const val = cells[1].textContent.trim();
    if (/year|released/.test(key)) { const m = val.match(/\b(19|20)\d{2}\b/); if (m) out.year = +m[0]; }
    if (/pieces|parts/.test(key)) { const m = val.replace(/,/g, '').match(/\d+/); if (m) out.pieceCount = +m[0]; }
    if (/^theme$/.test(key)) out.theme = val;
  });

  // Prices — look for dollar amounts near keywords in text
  const fullText = doc.body.innerText || doc.body.textContent || '';
  const lines = fullText.split('\n').map(l => l.trim()).filter(Boolean);
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i].toLowerCase();
    const next = lines[i + 1] || '';
    const dollarMatch = (s) => s.match(/\$\s*([\d,]+\.?\d*)/);
    if (/retail price/.test(l)) {
      const m = dollarMatch(next) || dollarMatch(lines[i]);
      if (m && !out.retailPriceUSD) out.retailPriceUSD = parseFloat(m[1].replace(/,/g, ''));
    }
    if (/value new|current value/.test(l)) {
      const m = dollarMatch(next) || dollarMatch(lines[i]);
      if (m && !out.marketValueUSD) out.marketValueUSD = parseFloat(m[1].replace(/,/g, ''));
    }
  }

  return out;
}


async function lookupSetDetails(setNumber) {
  // Web lookup only supplements Claude's knowledge with live BrickEconomy market data
  const num = String(setNumber).replace(/[-_]\d+$/, '').trim();
  const [econR, rateR] = await Promise.allSettled([scrapeBrickEconomy(num), getUSDtoSGD()]);

  const merged = {};
  if (econR.status === 'fulfilled') {
    const e = econR.value;
    const rate = rateR.status === 'fulfilled' ? rateR.value : 1.35;
    // Only use BrickEconomy market value (live secondary market) — retail price comes from Claude
    if (e.marketValueUSD) merged.marketValue = +(e.marketValueUSD * rate).toFixed(2);
  }
  return merged;
}

function resizeImage(file, maxWidth = 1200, quality = 0.88) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = url;
  });
}

function resizeImageFromDataUrl(dataUrl, maxWidth = 800, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

function renderListCards() {

    const matchSearch = !q || [s.name, s.setNumber, s.theme].some(f => f?.toLowerCase().includes(q));
    const matchCond   = !state.filterCondition || s.condition === state.filterCondition;
    const matchTheme  = !state.filterTheme || s.theme === state.filterTheme;
    return matchSearch && matchCond && matchTheme;
  });

  container.innerHTML = filtered.length === 0
    ? `<div class="empty-state">
         <div class="icon">🧱</div>
         <h3>${state.inventory.length === 0 ? 'No sets yet' : 'No matches'}</h3>

function triggerImagePicker() { $('#image-input')?.click(); }

async function lookupSetFromForm(e) {
  e.stopPropagation();
  const cfg = Config.get();
  if (!cfg?.anthropicKey) { showToast('Add Anthropic API key in Settings first'); return; }
  const setNumber = $('#f-setNumber')?.value.trim();
  if (!setNumber) { showToast('Enter a set number first'); return; }

  const btn = $('#lookup-btn');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    const meta = await fetchSetMetadata(cfg.anthropicKey.trim(), setNumber);
    // Only fill fields that are currently empty
    if (meta.name    && !$('#f-name')?.value.trim())      $('#f-name').value = meta.name;
    if (meta.theme   && !$('#f-theme')?.value.trim())     $('#f-theme').value = meta.theme;
    if (meta.year    && !$('#f-year')?.value)             $('#f-year').value = meta.year;
    if (meta.pieceCount && !$('#f-pieceCount')?.value)    $('#f-pieceCount').value = meta.pieceCount;
    if (meta.purchasePrice != null && !$('#f-purchasePrice')?.value) $('#f-purchasePrice').value = meta.purchasePrice;
    if (meta.marketValue   != null && !$('#f-marketValue')?.value)   $('#f-marketValue').value   = meta.marketValue;
    showToast('Set data filled in — review and adjust if needed.');
  } catch (err) {
    showToast('Lookup failed: ' + err.message, 6000);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔍 Look up'; }
  }
}

async function reanalyseCurrentImage(e) {
  e.stopPropagation();
  const cfg = Config.get();
  if (!cfg?.anthropicKey) { showToast('Add Anthropic API key in Settings first'); return; }

  const s = state.editingSet;
  const dataUrl = pendingImageDataUrl ||
    (s?.imagePath ? await fetch(`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/main/${s.imagePath}`)
      .then(r => r.blob()).then(b => new Promise((res, rej) => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.onerror = rej; fr.readAsDataURL(b); }))
    : null);
  if (!dataUrl) { showToast('No image to analyse'); return; }

  const btn = e.target;
  btn.disabled = true;
  btn.textContent = '✦ Analysing…';
  try {
    const result = await analyzeImageWithClaude(dataUrl);
    let webData = {};
    if (result.setNumber) {
      btn.textContent = '✦ Looking up data…';
      try { webData = await lookupSetDetails(result.setNumber); } catch (_) {}
    }
    // Only overwrite empty fields — don't stomp user edits
    const current = gatherFormValues();
    const merged = {};
    for (const k of Object.keys(result)) {
      merged[k] = current[k] || result[k];
    }
    for (const k of Object.keys(webData)) {
      merged[k] = current[k] || webData[k];
    }
    renderFormModal(merged);
    showToast('AI re-analysis complete — review the updated fields.');
  } catch (err) {
    showToast('Re-analysis failed: ' + err.message, 6000);
    btn.disabled = false;
    btn.textContent = '✦ Re-analyse with AI';
  }
}

function attachImagePickerHandler() {
  const input = $('#image-input');
  if (!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;

    const dataUrl = await resizeImage(file);
    pendingImageDataUrl = dataUrl;

    const cfg = Config.get();
    if (cfg?.anthropicKey) {
      // Show AI analysis overlay
      const picker = $('#image-picker');
      picker.innerHTML = `
        <img class="preview-img" src="${dataUrl}" alt="Set photo">
        <div class="ai-overlay">
          <span class="spinner spinner-purple" style="width:28px;height:28px;border-width:3px"></span>
          <span>Analysing with Claude…</span>
        </div>
        <input type="file" id="image-input" accept="image/*">
      `;
      // Disable save while analysing
      const saveBtn = $('#save-btn');
      if (saveBtn) { saveBtn.disabled = true; }

      try {
        const result = await analyzeImageWithClaude(dataUrl);

        // If AI found a set number, look up official data + prices
        let webData = {};
        if (result.setNumber) {
          const overlay = document.querySelector('#image-picker .ai-overlay');
          if (overlay) overlay.innerHTML = `
            <span class="spinner spinner-purple" style="width:28px;height:28px;border-width:3px"></span>
            <span>Looking up set data…</span>
          `;
          try { webData = await lookupSetDetails(result.setNumber); } catch (_) {}
        }

        // Web data (official LEGO + prices) overrides AI guesses
        renderFormModal({ ...result, ...webData });
        // Restore image
        pendingImageDataUrl = dataUrl;
        const newPicker = $('#image-picker');
        if (newPicker) {
          newPicker.innerHTML = `
            <img class="preview-img" src="${dataUrl}" alt="Set photo">
            <div class="change-overlay">📷 Change photo</div>
            <input type="file" id="image-input" accept="image/*">
          `;
          newPicker.onclick = () => $('#image-input').click();
          attachImagePickerHandler();
        }
        showToast('AI filled in the details — review and save!');
      } catch (err) {
        // Remove overlay, keep preview
        const picker2 = $('#image-picker');
        if (picker2) {
          picker2.innerHTML = `
            <img class="preview-img" src="${dataUrl}" alt="Set photo">
            <div class="change-overlay">📷 Change photo</div>
            <input type="file" id="image-input" accept="image/*">
          `;
          picker2.onclick = () => $('#image-input').click();
          attachImagePickerHandler();
        }
        if ($('#save-btn')) $('#save-btn').disabled = false;
        showToast('AI analysis failed:\n' + err.message, 6000);
      }
    } else {
      // No AI — just show preview
      const picker = $('#image-picker');
      picker.innerHTML = `
        <img class="preview-img" src="${dataUrl}" alt="Set photo">
        <div class="change-overlay">📷 Change photo</div>
        <input type="file" id="image-input" accept="image/*">
      `;
      picker.onclick = () => $('#image-input').click();
      attachImagePickerHandler();
    }
  });
}

function gatherFormValues() {
  return {
    setNumber: $('#f-setNumber')?.value.trim() || null,
    name: $('#f-name')?.value.trim() || null,
    theme: $('#f-theme')?.value.trim() || null,
    year: $('#f-year')?.value ? parseInt($('#f-year').value) : null,
    pieceCount: $('#f-pieceCount')?.value ? parseInt($('#f-pieceCount').value) : null,
    condition: $('#f-condition')?.value || 'unbuilt',
    owner: $('#f-owner')?.value || 'CK',
    purchasePrice: $('#f-purchasePrice')?.value ? parseFloat($('#f-purchasePrice').value) : null,
    marketValue: $('#f-marketValue')?.value ? parseFloat($('#f-marketValue').value) : null,
    purchaseDate: $('#f-purchaseDate')?.value || null,
    notes: $('#f-notes')?.value.trim() || null,
  };
}

function closeFormModal() {
  $('#form-modal').classList.remove('active');
  pendingImageDataUrl = null;
}

async function saveSet() {
  const name = $('#f-name').value.trim();
  if (!name) { showToast('Set name is required'); return; }

  const btn = $('#save-btn');
  btn.innerHTML = '<span class="spinner"></span> Saving…';
  btn.disabled = true;

  try {
    const isEdit = !!state.editingSet;
    const id = isEdit ? state.editingSet.id : generateId();
    let imagePath = isEdit ? (state.editingSet.imagePath || null) : null;

    if (pendingImageDataUrl) {
      showToast('Uploading photo…');
      imagePath = await uploadImage(pendingImageDataUrl, id);
    }

    const set = {
      id,
      ...gatherFormValues(),
      name,
      imagePath,
      updatedAt: new Date().toISOString(),
      createdAt: isEdit ? state.editingSet.createdAt : new Date().toISOString(),
    };

    if (isEdit) {
      const idx = state.inventory.findIndex(s => s.id === id);
      state.inventory[idx] = set;
    } else {
      state.inventory.unshift(set);
    }

    await saveInventory(isEdit ? `Update: ${name}` : `Add: ${name}`);
    closeFormModal();
    renderListView();
    showToast(isEdit ? 'Set updated!' : 'Set added to collection!');
  } catch (err) {
    showToast('Error: ' + err.message);
    btn.textContent = state.editingSet ? 'Save Changes' : 'Add to Collection';
    btn.disabled = false;
  }
}

async function confirmDelete(id) {
  const s = state.inventory.find(x => x.id === id);
  if (!s || !confirm(`Delete "${s.name}"?\n\nThis cannot be undone.`)) return;
  closeDetailModal();
  try {
    state.inventory = state.inventory.filter(x => x.id !== id);
    await saveInventory(`Delete: ${s.name}`);
    if (s.imagePath) {
      const img = await GitHub.getFile(s.imagePath).catch(() => null);
      if (img) await GitHub.deleteFile(s.imagePath, img.sha, `Remove image for ${s.name}`);
    }
    renderListView();
    showToast('Set deleted');
  } catch (err) {
    showToast('Error: ' + err.message);
  }
}

function renderDashboardView() {

  if (inv.length === 0) {

        <div class="de-icon">📊</div>
        <h3>No data yet</h3>
        <p>Add some sets to your collection to see your dashboard.</p>
      </div>`;
    return;
  }

  const totalInvested  = inv.reduce((a, s) => a + (parseFloat(s.purchasePrice) || 0), 0);
  const totalMarket    = inv.reduce((a, s) => a + (parseFloat(s.marketValue)   || 0), 0);
  const gain           = totalMarket - totalInvested;
  const returnPct      = totalInvested > 0 ? (gain / totalInvested) * 100 : null;

  // By theme
  const byTheme = {};
  inv.forEach(s => { if (s.theme) byTheme[s.theme] = (byTheme[s.theme] || 0) + 1; });
  const themeRows = Object.entries(byTheme).sort((a, b) => b[1] - a[1]);
  const maxTheme = themeRows[0]?.[1] || 1;

  // By owner
  const byOwner = {};
  inv.forEach(s => { const o = s.owner || 'CK'; byOwner[o] = (byOwner[o] || 0) + 1; });
  const ownerRows = Object.entries(byOwner).sort((a, b) => b[1] - a[1]);
  const maxOwner = ownerRows[0]?.[1] || 1;

  // By condition
  const built      = inv.filter(s => s.condition === 'built').length;
  const unbuilt    = inv.filter(s => s.condition === 'unbuilt').length;
  const incomplete = inv.filter(s => s.condition === 'incomplete').length;
  const maxCond    = Math.max(built, unbuilt, incomplete, 1);

  const themes = [...new Set(inv.map(s => s.theme).filter(Boolean))];

  const ownerAvatarColors = ['#E3000B','#D97706','#059669','#7C3AED','#2563EB'];

  $('#view-dashboard').innerHTML = `
    <div class="dash-body" style="padding-top:16px">

      <div class="dash-section-label">Financials</div>
      ${totalInvested === 0 && totalMarket === 0 ? `
        <div class="dcard" style="margin-bottom:10px;text-align:center;padding:20px">
          <div style="font-size:1.5rem;margin-bottom:8px">💰</div>
          <div style="font-size:0.9rem;font-weight:600;color:var(--dark);margin-bottom:4px">No prices recorded yet</div>
          <div style="font-size:0.8rem;color:var(--gray);line-height:1.5">Open a set, enter a purchase price and market value, then save. Or use the 🔍 Look up button with a set number.</div>
        </div>` : `
      <div class="dash-2col" style="margin-bottom:10px">
        <div class="dcard">
          <div class="dcard-label">Total Invested</div>
          <div class="dcard-value">${fmtCurrency(totalInvested)}</div>
        </div>
        <div class="dcard">
          <div class="dcard-label">Market Value</div>
          <div class="dcard-value">${fmtCurrency(totalMarket)}</div>
        </div>
      </div>
      ${totalInvested > 0 && totalMarket > 0 ? `
      <div class="dash-2col" style="margin-bottom:10px">
        <div class="dcard">
          <div class="dcard-label">Gain / Loss</div>
          <div class="dcard-value ${gain >= 0 ? 'pos' : 'neg'}">${gain >= 0 ? '+' : ''}${fmtCurrency(gain)}</div>
        </div>
        <div class="dcard">
          <div class="dcard-label">Return</div>
          <div class="dcard-value ${returnPct >= 0 ? 'pos' : 'neg'}">${returnPct >= 0 ? '+' : ''}${returnPct.toFixed(1)}%</div>
        </div>
      </div>` : ''}
      `}

      ${ownerRows.length > 0 ? `
      <div class="dash-section-label">By Owner</div>
      <div class="dlist">
        ${ownerRows.map(([owner, count], i) => `
          <div class="dlist-row">
            <div class="dlist-avatar" style="background:${ownerAvatarColors[i % ownerAvatarColors.length]}">${owner[0]}</div>
            <div class="dlist-name">${esc(owner)}</div>
            <div class="dlist-bar-wrap"><div class="dlist-bar" style="width:${Math.round(count/maxOwner*100)}%"></div></div>
            <div class="dlist-count">${count}</div>
          </div>`).join('')}
      </div>` : ''}

      ${themeRows.length > 0 ? `
      <div class="dash-section-label">By Theme</div>
      <div class="dlist">
        ${themeRows.map(([theme, count]) => `
          <div class="dlist-row">
            <div class="dlist-name">${esc(theme)}</div>
            <div class="dlist-bar-wrap"><div class="dlist-bar" style="width:${Math.round(count/maxTheme*100)}%"></div></div>
            <div class="dlist-count">${count}</div>
          </div>`).join('')}
      </div>` : ''}

      <div class="dash-section-label">By Condition</div>
      <div class="dlist">
        ${[['Built','built',built,'🏗️'],['Unbuilt','unbuilt',unbuilt,'📦'],['Incomplete','incomplete',incomplete,'🧩']]
          .filter(([,,c]) => c > 0)
          .map(([label,,count,icon]) => `
            <div class="dlist-row">
              <div class="cond-icon">${icon}</div>
              <div class="dlist-name">${label}</div>

    </div>

            4. Branch: <strong>main</strong>, folder: <strong>/ (root)</strong><br>
            5. Save — your app will be live at:<br>
            <a href="${pagesUrl}" target="_blank" style="color:var(--red);word-break:break-all">${pagesUrl}</a>
          </p>
        </div>
      </div>` : ''}

    <p style="text-align:center;margin-top:20px;font-size:0.78rem;color:var(--gray)">
      ${state.inventory.length} sets · Data stored in ${cfg.owner || '…'}/${cfg.repo || '…'}
    </p>
  `;
}

async function saveSettings() {
  _anthropicClient = null; // reset cached client when key changes
  const cfg = {
    owner: $('#s-owner').value.trim(),
    repo: $('#s-repo').value.trim(),
    token: $('#s-token').value.trim(),
    anthropicKey: $('#s-anthropic').value.trim() || null,
  };
  if (!Config.isValid(cfg)) { showToast('GitHub username, repo, and token are required'); return; }
  Config.set(cfg);
  try {
    const ok = await GitHub.testConnection();
    if (!ok) throw new Error('Could not connect to GitHub repository');
    await loadInventory();
    renderListView();
    if (state.view === 'settings') renderSettingsView();
    showToast('Settings saved!');
  } catch (err) {
    showToast('Error: ' + err.message);
  }
}

async function refreshInventory() {
  showToast('Refreshing…');
  try {
    await loadInventory();
    renderListView();
    showToast('Refreshed!');
  } catch (err) {
    showToast('Error: ' + err.message);
  }
}

function disconnectGitHub() {
  if (!confirm('Clear stored credentials? Your inventory data on GitHub will not be affected.')) return;
  Config.clear();
  renderSetup();
}

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
async function init() {
  const cfg = Config.get();
  if (!Config.isValid(cfg)) { renderSetup(); return; }
  try {
    await loadInventory();
    renderApp();
  } catch (err) {
    Config.clear();
    renderSetup();
    setTimeout(() => showToast('Session expired — please reconnect'), 400);
  }
}

init();
</script>
</body>
</html>
